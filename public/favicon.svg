<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 128 128">
  <style>
    .inner { fill: #C9A84C; }
    .outer { stroke: #C9A84C; }
    @media (prefers-color-scheme: dark) {
      .inner { fill: #E0C46A; }
      .outer { stroke: #E0C46A; }
    }
  </style>
  <!-- 光芒射线 × 12 — 昭明四方 -->
  <g class="outer" stroke-width="3" stroke-linecap="round">
    <line x1="64" y1="11" x2="64" y2="30"/>
    <line x1="64" y1="98" x2="64" y2="117"/>
    <line x1="11" y1="64" x2="30" y2="64"/>
    <line x1="98" y1="64" x2="117" y2="64"/>
    <line x1="26" y1="26" x2="40" y2="40"/>
    <line x1="88" y1="88" x2="102" y2="102"/>
    <line x1="26" y1="102" x2="40" y2="88"/>
    <line x1="88" y1="40" x2="102" y2="26"/>
    <line x1="16" y1="41" x2="31" y2="50"/>
    <line x1="97" y1="78" x2="112" y2="87"/>
    <line x1="16" y1="87" x2="31" y2="78"/>
    <line x1="97" y1="50" x2="112" y2="41"/>
  </g>
  <!-- 外环 — 本心之圆满 -->
  <circle cx="64" cy="64" r="32" class="outer" stroke-width="3.5"/>
  <!-- 内核光点 — 本心如炬，光明自昭 -->
  <circle cx="64" cy="64" r="12" class="inner"/>
</svg>
